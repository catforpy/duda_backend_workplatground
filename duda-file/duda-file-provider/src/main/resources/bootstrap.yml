# Bootstrap 配置 - 文件Provider服务

spring:
  application:
    name: duda-file-provider
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          # 公共配置（Redis、RocketMQ、MyBatis-Plus等）
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true

# Dubbo 最小配置（只保留启动必需的）
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}
  scan:
    base-packages: com.duda.file.provider
  provider:
    timeout: 10000
    retries: 0

