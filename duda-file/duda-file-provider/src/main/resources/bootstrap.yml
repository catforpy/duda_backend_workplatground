# Bootstrap 配置 - 文件Provider服务

spring:
  application:
    name: duda-file-provider
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          # 公共配置（Redis、RocketMQ、MyBatis-Plus等）
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true
          # 服务专属配置（OSS、STS等敏感信息）
          - data-id: duda-file-provider-${spring.profiles.active:dev}.yml
            group: DUDA_FILE_GROUP
            refresh: true

# Dubbo 最小配置（只保留启动必需的）
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registries:
    # 默认注册中心 - 用于注册FILE服务
    fileRegistry:
      address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
      parameters:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
      default: true
    # 订阅用户服务的注册中心
    userRegistry:
      address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
      parameters:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
  scan:
    base-packages: com.duda.file.provider,com.duda.file.rpc
  consumer:
    # 消费者配置
    check: false
  provider:
    timeout: 10000
    retries: 0
  serialize:
    security:
      # 严格模式检查序列化类
      # 允许java.sql.*和java.lang.*（默认已包含）
      # 添加阿里云OSS相关类的白名单
      allowlist:
        - java.sql.*
        - java.lang.*
        - java.util.*
        - com.duda.file.common.exception.*
        - com.duda.file.common.exception.StorageException
        - com.duda.file.common.exception.BucketNotFoundException
        - com.duda.file.common.exception.ObjectNotFoundException
        - com.duda.file.dto.bucket.*
        - com.duda.file.dto.bucket.BucketStatisticsDTO
        - com.duda.file.dto.upload.*
        - com.aliyun.oss.*


# OSS配置
oss:
  # Bucket名称
  bucket: ${OSS_BUCKET:duda-java-backend-test}
  # 区域（如：cn-hangzhou, cn-beijing）
  region: ${OSS_REGION:cn-hangzhou}
  # 访问密钥ID（生产环境建议使用STS）
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  # 访问密钥Secret
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  # STS Role ARN（如果使用STS临时凭证）
  sts-role-arn: ${OSS_STS_ROLE_ARN:}
  # 上传目录前缀
  upload-dir: ${OSS_UPLOAD_DIR:uploads/}
  # 签名过期时间（秒），默认3600秒（1小时）
  expire-time: ${OSS_EXPIRE_TIME:3600}
