# Bootstrap 配置 - 文件API服务

server:
  port: 8085

spring:
  application:
    name: duda-file-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        file-extension: yml
        shared-configs:
          # 公共配置
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
    # 禁用应用级服务发现
    qos-enable: false
    qos-accept-foreign-ip: false
    # 序列化配置
    serialize-check-status: WARN
    # 禁用严格的序列化检查
    checkSerializable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: DUDA_FILE_GROUP
      use-as-config-center: false
      use-as-metadata-center: false
  consumer:
    check: false
    timeout: 10000
    retries: 2

# 健康检查配置（Actuator）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true

# Swagger 配置（SpringDoc OpenAPI）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
