# Bootstrap 配置 - 文件API服务

server:
  port: 8085

spring:
  application:
    name: duda-file-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          # 公共配置
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true
          # 服务专属配置（OSS等）
          - data-id: duda-file-api-${spring.profiles.active:dev}.yml
            group: DUDA_FILE_GROUP
            refresh: true

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
    # 禁用应用级服务发现
    qos-enable: false
    qos-accept-foreign-ip: false
    # 序列化配置
    serialize-check-status: WARN
    # 禁用严格的序列化检查
    checkSerializable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: DUDA_FILE_GROUP
      use-as-config-center: false
      use-as-metadata-center: false
  consumer:
    check: false
    timeout: 10000
    retries: 2

# 健康检查配置（Actuator）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true

# Swagger 配置（SpringDoc OpenAPI）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# OSS配置
oss:
  # Bucket名称
  bucket: ${OSS_BUCKET:duda-java-backend-test}
  # 区域（如：cn-hangzhou, cn-beijing）
  region: ${OSS_REGION:cn-hangzhou}
  # 访问密钥ID（生产环境建议使用STS）
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  # 访问密钥Secret
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  # STS Role ARN（如果使用STS临时凭证）
  sts-role-arn: ${OSS_STS_ROLE_ARN:}
  # 上传目录前缀
  upload-dir: ${OSS_UPLOAD_DIR:uploads/}
  # 签名过期时间（秒），默认3600秒（1小时）
  expire-time: ${OSS_EXPIRE_TIME:3600}
