# Bootstrap 配置 - 文件API服务

server:
  port: 8085
  address: 0.0.0.0  # 绑定到所有网卡，支持局域网访问
  # 最大请求大小（支持大文件上传）
  max-http-request-header-size: 65536
  tomcat:
    # 最大连接数
    max-connections: 10000
    # 最大等待队列长度
    accept-count: 100
    # 最大请求头大小
    max-http-form-post-size: 100MB

spring:
  application:
    name: duda-file-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 文件上传配置
  servlet:
    multipart:
      # 是否启用文件上传
      enabled: true
      # 单个文件最大大小（默认1MB，改为1GB）
      max-file-size: 1GB
      # 总请求最大大小（默认10MB，改为2GB）
      max-request-size: 2GB
      # 文件大小阈值（超过此值将写入磁盘，而非内存）
      file-size-threshold: 10MB
      # 是否延迟解析（文件上传时）
      resolve-lazily: false

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: DUDA_FILE_GROUP
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          # 公共配置
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true
          # 服务专属配置（OSS等）
          - data-id: duda-file-api-${spring.profiles.active:dev}.yml
            group: DUDA_FILE_GROUP
            refresh: true

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
    # 禁用应用级服务发现
    qos-enable: false
    qos-accept-foreign-ip: false
    # 序列化配置
    serialize-check-status: WARN
    # 禁用严格的序列化检查
    checkSerializable: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: DUDA_FILE_GROUP
      use-as-config-center: false
      use-as-metadata-center: false
  consumer:
    check: false
    timeout: 10000
    retries: 2

# 健康检查配置（Actuator）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true

# Swagger 配置（SpringDoc OpenAPI + Knife4j）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# Knife4j增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  production: false
  cors: true
  # 增强功能
  enable-aggregation: true
  aggregation:
    # 聚合其他微服务的文档（如果需要）
    enable: false

# OSS配置
oss:
  # Bucket名称
  bucket: ${OSS_BUCKET:duda-java-backend-test}
  # 区域（如：cn-hangzhou, cn-beijing）
  region: ${OSS_REGION:cn-hangzhou}
  # 访问密钥ID（生产环境建议使用STS）
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  # 访问密钥Secret
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  # STS Role ARN（如果使用STS临时凭证）
  sts-role-arn: ${OSS_STS_ROLE_ARN:}
  # 上传目录前缀
  upload-dir: ${OSS_UPLOAD_DIR:uploads/}
  # 签名过期时间（秒），默认3600秒（1小时）
  expire-time: ${OSS_EXPIRE_TIME:3600}
