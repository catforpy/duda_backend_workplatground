# DudaNexus 微服务 Docker Compose 配置
# 使用方法: docker-compose up -d

version: '3.8'

services:
  # ==========================
  # 基础设施服务（用于本地测试）
  # ==========================

  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: duda-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Duda@2025
      MYSQL_DATABASE: duda_nexus
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pDuda@2025"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: duda-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass Duda@2025
    volumes:
      - redis-data:/data
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: duda-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: false
      TZ: Asia/Shanghai
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==========================
  # 业务微服务
  # ==========================

  # 用户Provider服务
  duda-user-provider:
    image: duda/user-provider:1.0.0
    build:
      context: ./duda-usercenter/duda-user-provider
      dockerfile: Dockerfile
    container_name: duda-user-provider
    ports:
      - "8082:8082"
      - "20882:20882"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /var/log/duda/user:/var/log/duda
    networks:
      - duda-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 用户API服务
  duda-user-api:
    image: duda/user-api:1.0.0
    build:
      context: ./duda-usercenter/duda-user-api
      dockerfile: Dockerfile
    container_name: duda-user-api
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /var/log/duda/user-api:/var/log/duda
    networks:
      - duda-network
    depends_on:
      - duda-user-provider
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

# 网络配置
networks:
  duda-network:
    driver: bridge
    name: duda-network

# 卷配置（可选，用于持久化数据）
volumes:
  duda-auth-logs:
    driver: local
  duda-user-logs:
    driver: local
  duda-gateway-logs:
    driver: local
