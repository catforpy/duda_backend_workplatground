# DudaNexus 微服务 Docker Compose 配置
# 使用方法: docker-compose up -d

services:
  # ==========================
  # 基础设施服务 (INFRA_GROUP)
  # ==========================

  # ID生成器服务 - 必须最先启动
  duda-id-generator:
    image: duda/id-generator-provider:1.0.0
    container_name: duda-id-generator
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms256m -Xmx256m
      - SNOWFLAKE_MACHINE_ID=1
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ==========================
  # 业务微服务
  # ==========================

  # 消息服务 (MSG_GROUP)
  duda-msg-provider:
    image: duda/msg-provider:1.0.0
    container_name: duda-msg-provider
    ports:
      - "9091:9091"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms256m -Xmx256m
      - SPRING_CLOUD_NACOS_CONFIG_IMPORT_CHECK_ENABLED=false
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 用户Provider服务 (USER_GROUP)
  duda-user-provider:
    image: duda/user-provider:1.0.0
    build:
      context: ./duda-usercenter/duda-user-provider
      dockerfile: Dockerfile
    container_name: duda-user-provider
    ports:
      - "8082:8082"
      - "20880:20880"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /var/log/duda/user:/var/log/duda
    networks:
      - duda-network
    depends_on:
      duda-id-generator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 用户API服务
  duda-user-api:
    image: duda/user-api:1.0.0
    build:
      context: ./duda-usercenter/duda-user-api
      dockerfile: Dockerfile
    container_name: duda-user-api
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /var/log/duda/user-api:/var/log/duda
    networks:
      - duda-network
    depends_on:
      - duda-user-provider
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

# 网络配置
networks:
  duda-network:
    driver: bridge
    name: duda-network
