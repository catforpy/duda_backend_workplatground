# DudaNexus 微服务 Docker Compose 配置
# 使用方法: docker-compose up -d

services:
  # ==========================
  # 基础设施服务 (INFRA_GROUP)
  # ==========================

  # ID生成器服务 - 必须最先启动
  duda-id-generator:
    image: duda/id-generator-provider:1.0.0
    container_name: duda-id-generator
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms256m -Xmx256m
      - SNOWFLAKE_MACHINE_ID=1
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ==========================
  # 业务微服务
  # ==========================

  # 消息服务 (MSG_GROUP)
  duda-msg-provider:
    build:
      context: ./duda-msg/duda-msg-provider
      dockerfile: Dockerfile
    image: duda/msg-provider:1.0.0
    container_name: duda-msg-provider
    ports:
      - "9091:9091"
      - "20881:20880"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms256m -Xmx512m
      - SPRING_CLOUD_NACOS_CONFIG_IMPORT_CHECK_ENABLED=false
    networks:
      - duda-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 用户Provider服务 (USER_GROUP)
  duda-user-provider:
    image: duda/user-provider:1.0.0
    build:
      context: ./duda-usercenter/duda-user-provider
      dockerfile: Dockerfile
    container_name: duda-user-provider
    ports:
      - "8082:8082"
      - "20882:20880"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /var/log/duda/user:/var/log/duda
    networks:
      - duda-network
    depends_on:
      duda-id-generator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 用户API服务 (USER_GROUP)
  duda-user-api:
    image: user-api:latest
    build:
      context: ./duda-usercenter/duda-user-api
      dockerfile: Dockerfile
    container_name: duda-user-api
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - duda-network
    depends_on:
      - duda-user-provider
      - duda-msg-provider
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 文件Provider服务 (FILE_GROUP)
  duda-file-provider:
    build:
      context: ./duda-file/duda-file-provider
      dockerfile: Dockerfile
    image: duda/file-provider:1.0.0
    container_name: duda-file-provider
    ports:
      - "8084:8080"
      - "20883:20880"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /var/log/duda/file:/var/log/duda
    networks:
      - duda-network
    depends_on:
      duda-id-generator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 文件API服务 (FILE_GROUP)
  duda-file-api:
    build:
      context: ./duda-file/duda-file-api
      dockerfile: Dockerfile
    image: duda/file-api:1.0.0
    container_name: duda-file-api
    ports:
      - "8085:8085"
      - "20885:20885"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx512m
      # OSS STS 配置
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_STS_ROLE_ARN=${OSS_STS_ROLE_ARN}
      - OSS_REGION=${OSS_REGION:-cn-hangzhou}
      - OSS_BUCKET=${OSS_BUCKET:-duda-java-backend-test}
    networks:
      - duda-network
    depends_on:
      - duda-file-provider
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ==========================
  # 网关服务 (GATEWAY_GROUP)
  # ==========================

  # 网关服务 - 统一入口 + Swagger文档
  duda-gateway:
    build:
      context: ./duda-gateway
      dockerfile: Dockerfile
    image: duda/gateway:1.0.0
    container_name: duda-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JAVA_OPTS=-Xms512m -Xmx1024m
    volumes:
      - /var/log/duda/gateway:/var/log/duda
    networks:
      - duda-network
    depends_on:
      - duda-user-provider
      - duda-user-api
      - duda-msg-provider
      - duda-file-provider
      - duda-file-api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 90s
    restart: unless-stopped

# 网络配置
networks:
  duda-network:
    driver: bridge
    name: duda-network
