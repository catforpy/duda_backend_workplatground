# ============================================================
# Nacos配置文件模板 - duda-tenant-provider.yml
# ============================================================
# 使用说明：
# 1. 复制此文件全部内容
# 2. 登录Nacos控制台: http://120.26.170.213:8848/nacos
# 3. 创建配置，Data ID填写: duda-tenant-provider.yml
# 4. Group填写: DUDA_TENANT_GROUP
# 5. 配置格式选择: YAML
# 6. 粘贴此内容到配置编辑器
# 7. 点击发布
# ============================================================

# 数据源配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://120.26.170.213:3306/duda_tenant?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: duda2024
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 连接池初始化大小
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大活跃连接数
      max-active: 20
      # 获取连接等待超时时间（毫秒）
      max-wait: 60000
      # 配置间隔检测需要关闭的空闲连接（毫秒）
      time-between-eviction-runs-millis: 60000
      # 连接最小生存时间（毫秒）
      min-evictable-idle-time-millis: 300000
      # 检测连接是否有效的SQL
      validation-query: SELECT 1
      # 申请连接时执行validationQuery检测连接是否有效
      test-while-idle: true
      # 申请连接时不执行validationQuery
      test-on-borrow: false
      # 归还连接时不执行validationQuery
      test-on-return: false
      # 开启PSCache
      pool-prepared-statements: true
      # PSCache大小
      max-pool-prepared-statement-per-connection-size: 20

  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 禁用二级缓存
    cache-enabled: false
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键类型（自增）
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0
  # Mapper XML文件位置
  mapper-locations: classpath*:mapper/**/*Mapper.xml

# 租户配置
tenant:
  default:
    tenant-id: 1
    tenant-code: DEFAULT
  quota:
    # 是否启用配额检查
    check-enabled: true
    # API调用限制（每天）
    api-call-limit: 10000
    # 存储空间限制（字节，默认10GB）
    storage-limit: 10737418240

# 业务配置
business:
  order:
    # 订单超时时间（分钟）
    expire-minutes: 30
  package:
    # 试用版时长（天）
    trial-duration-days: 15

# 日志配置
logging:
  level:
    # 租户服务日志级别
    com.duda.tenant: INFO
    # Mapper SQL日志级别
    com.duda.tenant.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
