# ============================================================
# 开发环境配置 - 直接复制到Nacos
# ============================================================
# Nacos配置信息：
# ├── Data ID:   duda-tenant-provider-dev.yml
# ├── Group:     DUDA_TENANT_GROUP
# ├── 命名空间:  duda-dev
# └── 配置格式:  YAML
#
# 操作步骤：
# 1. 登录: http://120.26.170.213:8848/nacos (nacos/nacos)
# 2. 命名空间 → 切换到 duda-dev
# 3. 配置管理 → 配置列表 → + 创建配置
# 4. 填写上方信息，粘贴下方内容，点击发布
# ============================================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://120.26.170.213:3306/duda_tenant?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: duda2024
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*Mapper.xml

tenant:
  default:
    tenant-id: 1
    tenant-code: DEFAULT
  quota:
    check-enabled: true
    api-call-limit: 10000
    storage-limit: 10737418240

business:
  order:
    expire-minutes: 30
  package:
    trial-duration-days: 15

logging:
  level:
    com.duda.tenant: INFO
    com.duda.tenant.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
