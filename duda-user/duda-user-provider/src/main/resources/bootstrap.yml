# Bootstrap 配置 - 用户服务

spring:
  application:
    name: duda-user-provider

  cloud:
    nacos:
      # 🔐 Nacos 认证配置（必须）
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP  # 🔑 用户服务使用 USER_GROUP
        metadata:
          management.context-path: /actuator
          version: ${PROJECT_VERSION:1.0.0}

      # 配置中心配置
      config:
        server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP  # 🔑 用户服务使用 USER_GROUP
        file-extension: yml
        refresh-enabled: true

        # 共享配置
        shared-configs:
          # 公共配置（从 COMMON_GROUP 引入）
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP  # 🔑 引用公共配置 Group
            refresh: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
