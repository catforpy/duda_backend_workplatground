# Bootstrap 配置
spring:
  application:
    name: ${SERVICE_NAME:duda-user-provider}  # 服务名，启动时指定
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}        # 🔐 认证必需
      password: ${NACOS_PASSWORD:nacos}        # 🔐 认证必需
      discovery:
        server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        metadata:
          management.context-path: /actuator
      config:
        server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          - data-id: common-${spring.profiles.active:dev}.yml
            group: ${NACOS_GROUP:DEFAULT_GROUP}
            refresh: true

---
# 主配置文件
spring:
  profiles:
    active: dev  # 开发环境

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:120.26.170.213}:${DB_PORT:3306}/duda_dev?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:duda2024}  # 🔐 已配置密码
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:120.26.170.213}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:duda2024}  # 🔐 已配置密码
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

---
# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.duda.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

---
# RocketMQ 配置
rocketmq:
  name-server: 120.26.170.213:9876
  producer:
    group: duda-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    max-message-size: 4194304
  consumer:
    group: duda-consumer-group

---
# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

---
# 日志配置
logging:
  level:
    root: INFO
    com.duda: DEBUG
    com.alibaba.cloud.nacos: INFO
    org.springframework.cloud.gateway: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{50}] %msg%n'
