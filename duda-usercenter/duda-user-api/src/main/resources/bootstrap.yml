# Bootstrap 配置 - 用户 API 服务

server:
  port: 8083

spring:
  application:
    name: duda-user-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        file-extension: yml
        shared-configs:
          # JWT配置（不同用户类型的密钥和过期时间）
          - data-id: jwt-config.yml
            group: COMMON_GROUP
            refresh: true
          # 从 Nacos 拉取公共配置（Redis、RocketMQ、MyBatis-Plus等）
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: USER_GROUP
      use-as-config-center: false
      use-as-metadata-center: false
  consumer:
    check: false
    timeout: 5000
    retries: 2

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_HOST:120.26.170.213}:${ROCKETMQ_PORT:9876}
  producer:
    group: user-api-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# ✅ 健康检查配置（Actuator）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true

# ✅ Swagger 配置（SpringDoc OpenAPI）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
