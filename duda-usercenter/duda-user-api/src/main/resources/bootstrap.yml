server:
  port: 8083

spring:
  application:
    name: duda-user-api
  cloud:
    nacos:
      server-addr: 120.26.170.213:8848
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        enabled: true
        register-enabled: true
#      config:
#        namespace: ${NACOS_NAMESPACE:duda-dev}
#        group: USER_GROUP
#        file-extension: yml
#        shared-configs:
#          - data-id: common-${spring.profiles.active:dev}.yml
#            group: COMMON_GROUP
#            refresh: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/duda_nexus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1  # -1表示自动分配端口
  registry:
    address: nacos://120.26.170.213:8848?username=nacos&password=nacos
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: DEFAULT_GROUP
      use-as-config-center: false  # 不作为配置中心
      use-as-metadata-center: false  # 不作为元数据中心
  consumer:
    check: false  # 启动时不检查服务提供者
    timeout: 5000
    retries: 2
