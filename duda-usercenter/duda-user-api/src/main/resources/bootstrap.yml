# Bootstrap 配置 - 用户 API 服务

server:
  port: 8083
  address: 0.0.0.0  # 绑定到所有网卡，支持局域网访问

spring:
  application:
    name: duda-user-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        file-extension: yml
        shared-configs:
          # JWT配置（不同用户类型的密钥和过期时间）
          - data-id: jwt-config.yml
            group: COMMON_GROUP
            refresh: true
          # 从 Nacos 拉取公共配置（Redis、RocketMQ、MyBatis-Plus等）
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1

  # 配置多个 Registry - 支持跨分组访问
  registries:
    # Registry 1: 用户服务（USER_GROUP）- 默认 registry
    userRegistry:
      address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
      parameters:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        use-as-config-center: false
        use-as-metadata-center: false
      default: true

    # Registry 2: 短信服务（MSG_GROUP）- 支持跨分组访问
    msgRegistry:
      address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
      parameters:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: MSG_GROUP
        use-as-config-center: false
        use-as-metadata-center: false
      default: false

    # Registry 3: 文件服务（FILE_GROUP）- 支持跨分组访问
    fileRegistry:
      address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
      parameters:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: FILE_GROUP
        use-as-config-center: false
        use-as-metadata-center: false
      default: false

    # Registry 4: 公共服务（COMMON_GROUP）- 支持跨分组访问
    commonRegistry:
      address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
      parameters:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: COMMON_GROUP
        use-as-config-center: false
        use-as-metadata-center: false
      default: false

  consumer:
    check: false
    timeout: 5000
    retries: 2

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_HOST:120.26.170.213}:${ROCKETMQ_PORT:9876}
  producer:
    group: user-api-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    access-key: app_readwrite          # 新增
    secret-key: ReadWrite@2024#Access  # 新增

# ✅ 健康检查配置（Actuator）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    defaults:
      enabled: true

# ✅ Swagger 配置（SpringDoc OpenAPI）
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
