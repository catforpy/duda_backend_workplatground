server:
  port: 8082

spring:
  application:
    name: duda-user-provider
  cloud:
    nacos:
      server-addr: 120.26.170.213:8848
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: USER_GROUP
        enabled: true
        register-enabled: true
#      config:
#        namespace: ${NACOS_NAMESPACE:duda-dev}
#        group: USER_GROUP
#        file-extension: yml
#        shared-configs:
#          - data-id: common-${spring.profiles.active:dev}.yml
#            group: COMMON_GROUP
#            refresh: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/duda_nexus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
  # Redis配置
  data:
    redis:
      host: 120.26.170.213
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

# Dubbo配置
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1  # -1表示自动分配端口
  registry:
    address: nacos://120.26.170.213:8848?username=nacos&password=nacos
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: DEFAULT_GROUP
      use-as-config-center: false  # 不作为配置中心
      use-as-metadata-center: false  # 不作为元数据中心
  scan:
    base-packages: com.duda.user.rpc
  consumer:
    check: false  # 启动时不检查服务提供者
    timeout: 5000
    retries: 2

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.duda.user.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
