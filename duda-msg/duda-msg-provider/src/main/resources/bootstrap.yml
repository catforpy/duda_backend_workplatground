# Bootstrap 配置 - 短信服务（最小配置，依赖Nacos）

server:
  port: 9091

spring:
  application:
    name: duda-msg-provider
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 配置中心
      config:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: MSG_GROUP
        file-extension: yml
        refresh-enabled: true
        shared-configs:
          # 从 Nacos 拉取公共配置（Redis等）
          - data-id: common-${spring.profiles.active:dev}.yml
            group: COMMON_GROUP
            refresh: true

      # 服务发现
      discovery:
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: MSG_GROUP
        enabled: true
        register-enabled: true

# Dubbo 序列化安全配置
dubbo:
  application:
    name: ${spring.application.name}
  serialize:
    serialize-check-status: DISABLE
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}?username=${spring.cloud.nacos.username}&password=${spring.cloud.nacos.password}
    parameters:
      namespace: ${NACOS_NAMESPACE:duda-dev}
      group: MSG_GROUP
  scan:
    base-packages: com.duda.msg.provider.rpc
