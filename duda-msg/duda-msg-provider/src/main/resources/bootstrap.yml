# Bootstrap 配置 - 短信服务

server:
  port: 9091

spring:
  application:
    name: duda-msg-provider
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Spring Cloud 2021+ 必须显式声明配置导入
  config:
    import:
      - optional:nacos:${spring.application.name}.yml  # 从 Nacos 导入配置
      - optional:nacos:common-${spring.profiles.active:dev}.yml  # 导入公共配置

  cloud:
    nacos:
      server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}

      # 服务发现配置
      discovery:
        server-addr: ${NACOS_HOST:120.26.170.213}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: MSG_GROUP
        enabled: true
        register-enabled: true

      # 配置中心配置
      config:
        enabled: true  # 启用 Nacos 配置中心
        namespace: ${NACOS_NAMESPACE:duda-dev}
        group: MSG_GROUP
        name: ${spring.application.name}
        file-extension: yml
        import-check:
          enabled: false  # 禁用配置导入检查
